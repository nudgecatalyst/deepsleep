<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finding Deep Sleep — 5-Day Deep Sleep Reset Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #F2EDE3;
    --cream: #EDE5D5;
    --bone: #E8DFCB;
    --soft-grey: #E8E6E2;
    --mist: #DCDAD5;
    --ink: #1A1A1F;
    --ink-soft: #3A3A42;
    --ink-mute: #6B6B70;
    --line: #D8CFBC;
    --line-light: #E8E1CD;
    --blue: #002FE0;
    --blue-deep: #001FAB;
    --orange: #FF5500;
    --orange-deep: #E64900;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--ivory);
    color: var(--ink);
    font-weight: 400;
    line-height: 1.55;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 1240px; margin: 0 auto; padding: 0 32px; }

  h1, h2, h3, h4 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.05;
    color: var(--ink);
  }
  h1 { font-size: clamp(48px, 7vw, 96px); }
  h2 { font-size: clamp(36px, 5vw, 64px); }
  h3 { font-size: clamp(24px, 3vw, 36px); }

  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-mute);
  }

  .lede {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(20px, 2vw, 24px);
    line-height: 1.4;
    color: var(--ink-soft);
  }

  em.accent { font-style: italic; font-weight: 300; color: var(--blue); }

  /* Nav */
  nav.top {
    position: sticky; top: 0; z-index: 100;
    background: rgba(242, 237, 227, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  nav.top .inner {
    max-width: 1240px; margin: 0 auto; padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  /* Wordmark logo (image) — 50% larger than before */
  .wordmark { display: flex; align-items: center; gap: 12px; line-height: 1; }
  .wordmark .logo-img { height: 63px; width: auto; display: block; }
  .wordmark .loc {
    color: var(--ink-mute); font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    font-family: 'Inter', sans-serif; font-weight: 500;
  }

  .nav-links { display: flex; gap: 30px; align-items: center; }
  .nav-links a {
    color: var(--ink-soft); text-decoration: none;
    font-size: 14px; font-weight: 400;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a.btn { color: #fff !important; }
  .nav-links a.btn:hover { color: #fff !important; }

  /* Buttons */
  .btn {
    display: inline-block; padding: 14px 28px;
    background: var(--blue); color: #fff;
    text-decoration: none; border-radius: 4px;
    font-size: 14px; font-weight: 500; letter-spacing: 0.04em;
    transition: background 0.2s ease;
    cursor: pointer; border: none;
    font-family: 'Inter', sans-serif;
  }
  a.btn:link, a.btn:visited, a.btn:hover, a.btn:active { color: #fff; text-decoration: none; }
  .btn:hover { background: var(--blue-deep); }

  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
  a.btn.btn-ghost:link, a.btn.btn-ghost:visited { color: var(--ink); }
  .btn-ghost:hover { background: var(--ink); color: var(--ivory); }
  a.btn.btn-ghost:hover { color: var(--ivory); }

  .btn-orange { background: var(--orange); color: #fff; }
  a.btn.btn-orange:link, a.btn.btn-orange:visited, a.btn.btn-orange:hover { color: #fff; }
  .btn-orange:hover { background: var(--orange-deep); }

  /* Hero */
  .hero { padding: 80px 0 100px; }
  .hero .grid {
    display: grid; grid-template-columns: 1.05fr 1fr;
    gap: 80px; align-items: center;
  }
  .hero .copy { padding-right: 20px; }
  .hero h1 { margin: 28px 0 32px; }
  .hero .lede { margin-bottom: 40px; max-width: 480px; }
  .hero .cta-row { display: flex; gap: 16px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
  .hero .price-note { font-size: 13px; color: var(--ink-mute); }
  .hero .image {
    position: relative; aspect-ratio: 4/5;
    overflow: hidden; border-radius: 4px; background: var(--cream);
  }
  .hero .image img {
    width: 100%; height: 100%; object-fit: cover;
    filter: contrast(0.95) brightness(0.92);
  }
  .hero .image-caption {
    position: absolute; bottom: 24px; left: 24px; right: 24px;
    color: var(--ivory); font-family: 'Fraunces', serif;
    font-size: 18px; font-style: italic; font-weight: 300;
    text-shadow: 0 1px 12px rgba(0,0,0,0.5);
  }

  /* Trust strip */
  .trust {
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 28px 0; background: var(--cream);
  }
  .trust .row {
    display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 24px;
  }
  .trust .item {
    font-family: 'Fraunces', serif; font-weight: 300;
    font-size: 15px; color: var(--ink-soft); font-style: italic;
  }
  .trust .item strong {
    font-style: normal; font-weight: 400;
    color: var(--ink); margin-right: 6px;
  }

  /* Countdown */
  .countdown-band { background: var(--ink); color: var(--ivory); padding: 28px 0; }
  .countdown-band .row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 32px; flex-wrap: wrap;
  }
  .countdown-band .label { display: flex; flex-direction: column; gap: 4px; }
  .countdown-band .label .top {
    font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(242,237,227,0.65);
    font-weight: 500;
  }
  .countdown-band .label .when {
    font-family: 'Fraunces', serif; font-size: 22px;
    font-weight: 300; color: var(--ivory); letter-spacing: -0.01em;
  }
  .countdown-band .label .when em { color: var(--orange); font-style: italic; }
  .countdown-band .timer { display: flex; gap: 14px; }
  .countdown-band .unit {
    display: flex; flex-direction: column; align-items: center; min-width: 64px;
  }
  .countdown-band .unit .num {
    font-family: 'Fraunces', serif;
    font-size: 36px; font-weight: 300;
    color: var(--orange); line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .countdown-band .unit .key {
    font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(242,237,227,0.6);
    margin-top: 6px; font-weight: 500;
  }
  .countdown-band .cta-btn { white-space: nowrap; }

  section { padding: 120px 0; }
  .section-head {
    display: grid; grid-template-columns: 1fr 1.4fr;
    gap: 80px; margin-bottom: 72px; align-items: start;
  }
  .section-head .title h2 { margin-top: 18px; }
  .section-head .desc { padding-top: 18px; }

  /* WHAT YOU GET — tabbed */
  .expect { background: var(--bone); }
  .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
  .tab {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; background: transparent;
    border: 1px solid var(--ink); border-radius: 999px;
    cursor: pointer; transition: all 0.2s ease;
    color: var(--ink); font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 500; text-align: left;
    letter-spacing: 0.01em;
  }
  .tab .tab-left { display: flex; align-items: center; gap: 16px; }
  .tab .tab-num {
    font-family: 'Fraunces', serif; font-weight: 400;
    font-size: 14px; color: var(--ink-mute); letter-spacing: 0.04em;
  }
  .tab .tab-mark {
    font-family: 'Fraunces', serif; font-size: 24px;
    font-weight: 300; color: var(--ink-mute); line-height: 1;
  }
  .tab:hover { background: var(--cream); }
  .tab.active { background: var(--orange); color: #fff; border-color: var(--orange); }
  .tab.active .tab-num, .tab.active .tab-mark { color: rgba(255,255,255,0.85); }

  .tab-panel {
    display: grid; grid-template-columns: 1fr 1.1fr;
    border: 1px solid var(--line); border-radius: 4px;
    overflow: hidden; background: var(--ivory);
  }
  .tab-image { background: var(--cream); overflow: hidden; min-height: 480px; }
  .tab-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .tab-content { padding: 48px 56px; display: flex; flex-direction: column; }
  .tab-content .row {
    display: grid; grid-template-columns: 140px 1fr; gap: 24px;
    padding: 20px 0; border-bottom: 1px dashed var(--line); align-items: start;
  }
  .tab-content .row:first-child { padding-top: 0; }
  .tab-content .row .label {
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-mute); font-weight: 500; padding-top: 4px;
  }
  .tab-content .row .value { font-size: 15px; color: var(--ink); line-height: 1.55; }
  .tab-content .row .value.title-row {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400;
    letter-spacing: -0.01em; line-height: 1.25;
  }
  .tab-content .row .value ul { list-style: none; }
  .tab-content .row .value ul li {
    position: relative; padding-left: 20px; color: var(--ink-soft); margin-bottom: 6px;
  }
  .tab-content .row .value ul li:before {
    content: ""; position: absolute; left: 0; top: 10px;
    width: 8px; height: 8px; background: var(--orange); border-radius: 50%;
  }
  .tab-content .tab-cta { margin-top: 32px; }
  .tab-content .tab-cta a { width: 100%; text-align: center; display: inline-block; }

  /* INSIDE */
  .inside-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px;
    background: var(--line);
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
  }
  .inside-card { background: var(--ivory); padding: 56px 48px; }
  .inside-card .num {
    font-family: 'Fraunces', serif; font-size: 14px;
    color: var(--orange); letter-spacing: 0.04em;
    margin-bottom: 24px; font-weight: 400;
  }
  .inside-card h3 { font-size: 28px; margin-bottom: 16px; font-weight: 400; }
  .inside-card p { color: var(--ink-soft); font-size: 15px; line-height: 1.6; max-width: 460px; }

  /* SENSORY — WHITE BACKGROUND */
  .sensory { background: #ffffff; }
  .sensory-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  }
  .sensory-card {
    border: 1px solid var(--line); border-radius: 4px;
    padding: 32px 28px 28px;
    background: var(--cream);
    display: flex; flex-direction: column; min-height: 240px;
  }
  .sensory-card .sense-header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-bottom: 14px; margin-bottom: 18px;
    border-bottom: 1px dashed var(--line);
  }
  .sensory-card .sense-label {
    font-family: 'Fraunces', serif; font-weight: 400;
    font-size: 20px; color: var(--ink); letter-spacing: -0.01em;
  }
  .sensory-card .sense-num {
    font-family: 'Inter', sans-serif; font-weight: 500;
    font-size: 11px; letter-spacing: 0.18em; color: var(--ink-mute);
  }
  .sensory-card p { color: var(--ink-soft); font-size: 14px; line-height: 1.6; }

  /* COMPARE — table */
  .compare { background: var(--cream); }
  .compare-table-wrap {
    background: var(--ivory); border-radius: 4px;
    padding: 48px 40px 40px;
    border: 1px solid var(--line);
    position: relative; overflow-x: auto;
  }
  .compare-table {
    width: 100%; border-collapse: separate; border-spacing: 0; min-width: 760px;
  }
  .compare-table th, .compare-table td {
    text-align: center; padding: 18px 14px; vertical-align: middle;
    border-bottom: 1px dashed var(--line);
  }
  .compare-table thead th {
    font-family: 'Fraunces', serif; font-weight: 400;
    font-size: 18px; color: var(--ink); letter-spacing: -0.01em;
    border-bottom: 1px solid var(--ink); padding-bottom: 20px;
  }
  .compare-table tbody td:first-child,
  .compare-table thead th:first-child { text-align: left; }
  .compare-table .row-label {
    font-family: 'Inter', sans-serif; font-weight: 600;
    font-size: 15px; color: var(--ink); display: block; margin-bottom: 4px;
  }
  .compare-table .row-desc {
    font-size: 12px; color: var(--ink-mute);
    font-weight: 400; letter-spacing: 0.02em;
  }
  .compare-table thead th.ours,
  .compare-table tbody td.ours {
    background: rgba(255,85,0,0.05); position: relative;
  }
  .compare-table thead th.ours {
    background: rgba(255,85,0,0.1); color: var(--ink);
    border-radius: 6px 6px 0 0;
  }
  .compare-table tbody tr:last-child td.ours { border-radius: 0 0 6px 6px; }

  .mark-yes, .mark-no, .mark-partial {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 6px;
    font-weight: 600; font-size: 15px;
  }
  .mark-yes { background: rgba(0,47,224,0.1); color: var(--blue); }
  .ours .mark-yes { background: var(--orange); color: #fff; }
  .mark-no { background: rgba(0,0,0,0.05); color: var(--ink-mute); }
  .mark-partial { background: rgba(0,0,0,0.05); color: var(--ink-mute); }

  /* MANIFESTO */
  .manifesto { position: relative; padding: 160px 0; background: var(--ink); overflow: hidden; }
  .manifesto .bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    opacity: 0.4;
  }
  .manifesto .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(26,26,31,0.65), rgba(26,26,31,0.85));
  }
  .manifesto .container { position: relative; z-index: 2; text-align: center; }
  .manifesto h2 {
    color: var(--ivory);
    font-size: clamp(40px, 6vw, 72px);
    max-width: 960px; margin: 0 auto 28px;
  }
  .manifesto h2 em.accent { color: var(--orange); }
  .manifesto .sub {
    font-family: 'Fraunces', serif; font-weight: 300;
    font-size: clamp(18px, 2vw, 22px);
    color: rgba(242,237,227,0.78);
    max-width: 620px; margin: 0 auto 48px;
    font-style: italic; line-height: 1.5;
  }
  .manifesto .pills {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
  }
  .manifesto .pill {
    padding: 10px 22px;
    border: 1px solid rgba(242,237,227,0.5);
    border-radius: 999px;
    color: var(--ivory);
    font-size: 13px; font-weight: 500;
    letter-spacing: 0.04em;
  }

  /* WHY */
  .why { background: var(--cream); }
  .why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 48px; margin-top: 60px; }
  .why-item { border-top: 1px solid var(--line); padding-top: 28px; }
  .why-item .num {
    font-family: 'Fraunces', serif; font-size: 13px;
    color: var(--ink-mute); margin-bottom: 16px; letter-spacing: 0.06em;
  }
  .why-item h4 {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400;
    margin-bottom: 14px; letter-spacing: -0.01em;
  }
  .why-item p { font-size: 14px; color: var(--ink-soft); line-height: 1.6; }

  /* BUILT FOR */
  .builtfor-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: center;
  }
  .builtfor-list { list-style: none; }
  .builtfor-list li {
    padding: 24px 0; border-bottom: 1px solid var(--line);
    display: grid; grid-template-columns: 120px 1fr; gap: 24px; align-items: baseline;
  }
  .builtfor-list li:last-child { border-bottom: none; }
  .builtfor-list .who {
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-mute); padding-top: 4px;
  }
  .builtfor-list .what {
    font-family: 'Fraunces', serif; font-weight: 300;
    font-size: 21px; line-height: 1.35; color: var(--ink);
  }
  .builtfor-image { aspect-ratio: 1/1; overflow: hidden; border-radius: 4px; }
  .builtfor-image img {
    width: 100%; height: 100%; object-fit: cover;
    filter: contrast(0.96) brightness(0.94);
  }

  /* FOUNDER — dark variant */
  .founder { background: #000; color: var(--ivory); }
  .founder .eyebrow { color: rgba(242,237,227,0.6); }
  .founder h2 { color: var(--ivory); }
  .founder h2 em.accent { color: var(--orange); }
  .founder-grid {
    display: grid; grid-template-columns: 0.9fr 1.2fr;
    gap: 72px; align-items: start;
  }
  .founder-image-wrap { position: sticky; top: 100px; }
  .founder-image {
    aspect-ratio: 4/5; overflow: hidden; border-radius: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .founder-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .founder-image .placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; padding: 32px; text-align: center;
    color: rgba(242,237,227,0.6); font-size: 13px;
    background: rgba(255,255,255,0.04);
  }
  .founder-image .placeholder strong { display: block; margin-bottom: 8px; color: var(--ivory); }
  .founder-meta { margin-top: 20px; }
  .founder-meta .name {
    font-family: 'Fraunces', serif; font-weight: 400;
    font-size: 22px; color: var(--ivory); letter-spacing: -0.01em;
  }
  .founder-meta .role {
    font-size: 13px; color: rgba(242,237,227,0.55); margin-top: 4px;
    letter-spacing: 0.02em;
  }
  .founder-text h2 { margin-bottom: 36px; }
  .founder-text p {
    font-family: 'Fraunces', serif; font-weight: 300;
    font-size: 18px; line-height: 1.55; color: rgba(242,237,227,0.82);
    margin-bottom: 20px;
  }
  .pull-quote {
    margin-top: 40px; padding: 32px 36px;
    border-left: 4px solid var(--orange);
    background: rgba(255,255,255,0.05);
    font-family: 'Fraunces', serif;
    font-size: 22px; font-style: italic; font-weight: 300;
    color: var(--ivory); line-height: 1.4;
    border-radius: 0 4px 4px 0;
  }

  /* PRICING */
  .pricing { background: var(--bone); }
  .pricing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 60px; }
  .plan {
    background: var(--ivory); border: 1px solid var(--line);
    padding: 48px 40px; border-radius: 4px;
    display: flex; flex-direction: column; position: relative;
  }
  .plan.featured {
    background: var(--blue); color: var(--ivory); border-color: var(--blue);
  }
  .plan.featured .plan-name,
  .plan.featured .plan-price,
  .plan.featured h3 { color: var(--ivory); }
  .plan.featured .plan-desc { color: rgba(242,237,227,0.8); }
  .plan.featured .includes li {
    color: rgba(242,237,227,0.9); border-color: rgba(242,237,227,0.18);
  }
  .plan.featured .includes li:before { color: var(--orange); }
  .plan .badge {
    position: absolute; top: -12px; right: 24px;
    background: var(--orange); color: #fff;
    padding: 6px 14px; font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase;
    border-radius: 100px; font-weight: 500;
  }
  .plan-name { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 400; margin-bottom: 8px; }
  .plan-desc { font-size: 14px; color: var(--ink-mute); margin-bottom: 32px; }
  .plan-price { display: flex; align-items: baseline; gap: 8px; margin-bottom: 32px; }
  .plan-price .amount {
    font-family: 'Fraunces', serif; font-size: 56px;
    font-weight: 300; letter-spacing: -0.02em;
  }
  .plan-price .currency {
    font-family: 'Fraunces', serif; font-size: 22px;
    font-weight: 300; color: var(--ink-mute);
  }
  .plan.featured .plan-price .currency { color: rgba(242,237,227,0.65); }
  .includes { list-style: none; margin-bottom: 32px; }
  .includes li {
    padding: 12px 0 12px 28px; border-bottom: 1px solid var(--line);
    font-size: 14px; color: var(--ink-soft); position: relative;
  }
  .includes li:before {
    content: "·"; position: absolute; left: 8px; top: 8px;
    font-size: 24px; color: var(--orange); line-height: 1;
  }
  .includes li:last-child { border-bottom: none; }
  .plan .btn { width: 100%; text-align: center; margin-top: auto; }
  .plan.featured .btn { background: var(--orange); color: #fff; }
  .plan.featured .btn:hover { background: var(--orange-deep); }

  /* TESTIMONIALS — WHITE BACKGROUND */
  .testimonials-section { background: #ffffff; }
  .testimonials-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-top: 60px;
  }
  .testimonial {
    padding: 40px 32px; border: 1px solid var(--line);
    background: var(--ivory); border-radius: 4px;
    display: flex; flex-direction: column;
  }

  const tabs = document.querySelectorAll('#expectTabs .tab');
  const panel = document.getElementById('expectPanel');
  tabs.forEach(t => {
    t.addEventListener('click', () => {
      tabs.forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const idx = parseInt(t.dataset.tab, 10);
      panel.innerHTML = renderExpectPanel(CONTENT.expect.tabs[idx]);
    });
  });

  // Countdown
  const target = new Date(CONTENT.countdown.targetISO).getTime();
  const elDays = document.getElementById('cdDays');
  const elHours = document.getElementById('cdHours');
  const elMins = document.getElementById('cdMins');
  const elSecs = document.getElementById('cdSecs');
  const timerEl = document.getElementById('cdTimer');
  function tickCountdown() {
    const diff = target - Date.now();
    if (diff <= 0) {
      timerEl.innerHTML = `<div style="font-family:'Fraunces',serif;font-size:22px;color:var(--orange);font-style:italic;">${esc(CONTENT.countdown.livePrefix)} <span style="color:var(--ivory);">${esc(CONTENT.countdown.liveSuffix)}</span></div>`;
      return false;
    }
    elDays.textContent  = pad(Math.floor(diff / 86400000));
    elHours.textContent = pad(Math.floor((diff % 86400000) / 3600000));
    elMins.textContent  = pad(Math.floor((diff % 3600000) / 60000));
    elSecs.textContent  = pad(Math.floor((diff % 60000) / 1000));
    return true;
  }
  if (tickCountdown()) { setInterval(tickCountdown, 1000); }

  // Challenge chips
  const MAX_CHALLENGES = 3;
  const cloud = document.getElementById('chCloud');
  const counter = document.getElementById('chCounter');
  const selected = new Set();
  const refreshChips = () => {
    counter.textContent = `(${selected.size} / ${MAX_CHALLENGES})`;
    cloud.querySelectorAll('.chip').forEach(c => {
      const isSel = selected.has(c.dataset.value);
      c.classList.toggle('selected', isSel);
      c.classList.toggle('disabled', !isSel && selected.size >= MAX_CHALLENGES);
    });
  };
  cloud.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      const v = c.dataset.value;
      if (selected.has(v)) selected.delete(v);
      else if (selected.size < MAX_CHALLENGES) selected.add(v);
      refreshChips();
    });
  });

  // Form -> WhatsApp
  const form = document.getElementById('enrolForm');
  const errorBox = document.getElementById('formError');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const data = new FormData(form);
    const fullName = (data.get('fullName') || '').toString().trim();
    const whatsapp = (data.get('whatsapp') || '').toString().trim();
    const email    = (data.get('email')    || '').toString().trim();
    const city     = (data.get('city')     || '').toString().trim();
    const occupation = (data.get('occupation') || '').toString();
    const plan     = (data.get('plan')     || '').toString();
    const batch    = (data.get('batch')    || '').toString();
    const challenges = Array.from(selected);

    if (!fullName || !whatsapp || !city || !occupation || !plan || !batch || challenges.length === 0) {
      errorBox.classList.add('show');
      window.scrollTo({ top: form.getBoundingClientRect().top + window.scrollY - 60, behavior: 'smooth' });
      return;
    }
    errorBox.classList.remove('show');

    const lines = [
      CONTENT.enrol.messagePrefix,
      '',
      'Hi! I would like to enrol in the program.',
      '',
      '*My Details:*',
      '• Full Name: ' + fullName,
      '• WhatsApp: ' + whatsapp,
      '• Email: ' + (email || 'Not provided'),
      '• City: ' + city,
      '• Occupation: ' + occupation,
      '',
      '*Programme Choice:*',
      '• Plan: ' + plan,
      '• Batch: ' + batch,
      '',
      '*Current Challenges:*',
      ...challenges.map(c => '• ' + c),
      '',
      'Please share the payment link to confirm my spot. Thank you.'
    ];
    const url = `https://wa.me/${CONTENT.enrol.whatsappNumber}?text=${encodeURIComponent(lines.join('\n'))}`;
    window.open(url, '_blank', 'noopener');
  });

})();
</script>

</body>
</html>
